<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Table Ronde IA</title>
<style>
  :root {
    --bg: #0e0f13; --panel: #16181f; --border: #262932;
    --text: #e7e9ee; --muted: #8b909c; --accent: #e8b339;
    --ok: #2ecc71; --err: #ff6b6b; --blue: #4d9fff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at 50% -10%, #1a1d27 0%, var(--bg) 55%);
    color: var(--text); line-height: 1.5; min-height: 100vh;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 32px 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 18px;
  }
  .card h2 { font-size: 14px; margin: 0 0 14px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  label { display: block; font-size: 13px; margin-bottom: 6px; }
  select, input[type=text], input[type=password] {
    width: 100%; background: #0e0f13; border: 1px solid var(--border); color: var(--text);
    padding: 9px 11px; border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  /* Switch */
  .switch-row { display: flex; align-items: center; gap: 12px; }
  .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex: 0 0 auto; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0; background: #3a3d47;
    transition: .2s; border-radius: 26px;
  }
  .slider:before {
    position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
    background: #fff; transition: .2s; border-radius: 50%;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider:before { transform: translateX(20px); }

  /* Provider radios */
  .providers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .prov {
    border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer;
    transition: border-color .15s, background .15s; position: relative;
  }
  .prov.sel { border-color: var(--accent); background: rgba(232,179,57,.08); }
  .prov.disabled { opacity: .45; cursor: not-allowed; }
  .prov input { position: absolute; opacity: 0; }
  .prov .pname { font-weight: 600; font-size: 15px; }
  .prov .pdesc { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; margin-left: 6px; }
  .badge.on { background: rgba(46,204,113,.15); color: var(--ok); }
  .badge.off { background: rgba(255,107,107,.15); color: var(--err); }

  button {
    background: var(--accent); color: #1a1300; border: none; padding: 12px 22px;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .actions { display: flex; align-items: center; gap: 14px; }
  .hint { font-size: 13px; color: var(--muted); }
  .hint.ok { color: var(--ok); } .hint.err { color: var(--err); }
  a { color: var(--blue); text-decoration: none; }
  .voices { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.7; }
  .voices code { color: var(--text); background: #0e0f13; padding: 1px 6px; border-radius: 5px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚙️ Administration — TTS</h1>
  <div class="sub">Configuration de la synthèse vocale. <a href="/">← Retour au débat</a></div>

  <div class="card">
    <h2>Audio</h2>
    <div class="switch-row">
      <label class="switch"><input type="checkbox" id="enabled" /><span class="slider"></span></label>
      <span id="enabledLabel">Audio désactivé</span>
    </div>
  </div>

  <div class="card">
    <h2>Fournisseur de voix</h2>
    <div class="providers" id="providers">
      <label class="prov" data-prov="openai">
        <input type="radio" name="provider" value="openai" />
        <div class="pname">OpenAI <span class="badge" id="badge-openai"></span></div>
        <div class="pdesc">tts — économique, multilingue</div>
      </label>
      <label class="prov" data-prov="elevenlabs">
        <input type="radio" name="provider" value="elevenlabs" />
        <div class="pname">ElevenLabs <span class="badge" id="badge-elevenlabs"></span></div>
        <div class="pdesc">streaming, voix très naturelles</div>
      </label>
    </div>

    <div class="field" id="openaiModelField" style="margin-top:16px;">
      <label>Modèle OpenAI</label>
      <select id="openaiModel"></select>
    </div>
    <div class="field" id="elevenModelField">
      <label>Modèle ElevenLabs</label>
      <select id="elevenModel"></select>
    </div>

    <div class="voices">
      Voix OpenAI par rôle : MC <code>onyx</code> · Stratège <code>echo</code> · Créatif <code>nova</code> · Critique <code>fable</code>
      <br>(modifiable via variables d'env <code>VOICE_OPENAI_*</code>)
    </div>
  </div>

  <div class="card" id="tokenCard">
    <h2>Authentification</h2>
    <div class="field">
      <label>Token bridge (requis pour enregistrer)</label>
      <input type="password" id="token" placeholder="Bearer token…" autocomplete="off" />
    </div>
  </div>

  <div class="actions">
    <button id="saveBtn">Enregistrer</button>
    <span class="hint" id="hint"></span>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const TOKEN_KEY = 'tr_bridgeToken';
let cfg = null;

function setHint(msg, cls) { const h = $('hint'); h.textContent = msg; h.className = 'hint' + (cls ? ' ' + cls : ''); }

function renderProviders() {
  document.querySelectorAll('.prov').forEach(el => {
    const p = el.dataset.prov;
    const info = cfg.providers[p] || { available: false };
    const badge = $('badge-' + p);
    badge.textContent = info.available ? 'configuré' : 'clé manquante';
    badge.className = 'badge ' + (info.available ? 'on' : 'off');
    const input = el.querySelector('input');
    input.disabled = !info.available;
    el.classList.toggle('disabled', !info.available);
    el.classList.toggle('sel', cfg.provider === p);
    input.checked = cfg.provider === p;
  });
}

function fillModels(selectId, models, current) {
  const sel = $(selectId);
  sel.innerHTML = '';
  (models || []).forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === current) o.selected = true;
    sel.appendChild(o);
  });
}

function syncEnabledLabel() {
  $('enabledLabel').textContent = $('enabled').checked ? 'Audio activé' : 'Audio désactivé';
}

async function load() {
  try {
    const r = await fetch('/tts/config');
    cfg = await r.json();
    $('enabled').checked = !!cfg.enabled;
    syncEnabledLabel();
    renderProviders();
    fillModels('openaiModel', cfg.providers.openai.models, cfg.openaiModel);
    fillModels('elevenModel', cfg.providers.elevenlabs.models, cfg.elevenModel);
    $('tokenCard').style.display = cfg.tokenRequired ? '' : 'none';
    $('token').value = localStorage.getItem(TOKEN_KEY) || '';
  } catch (e) { setHint('Impossible de charger la config : ' + e.message, 'err'); }
}

$('enabled').addEventListener('change', syncEnabledLabel);
document.querySelectorAll('input[name=provider]').forEach(inp => {
  inp.addEventListener('change', () => {
    cfg.provider = inp.value;
    document.querySelectorAll('.prov').forEach(el => el.classList.toggle('sel', el.dataset.prov === inp.value));
  });
});

$('saveBtn').addEventListener('click', async () => {
  setHint('Enregistrement…');
  $('saveBtn').disabled = true;
  const token = $('token').value.trim();
  if (token) localStorage.setItem(TOKEN_KEY, token);
  const body = {
    enabled: $('enabled').checked,
    provider: document.querySelector('input[name=provider]:checked')?.value || cfg.provider,
    openaiModel: $('openaiModel').value,
    elevenModel: $('elevenModel').value,
  };
  try {
    const r = await fetch('/tts/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
      body: JSON.stringify(body),
    });
    if (r.status === 401) { setHint('Token invalide ou manquant.', 'err'); $('saveBtn').disabled = false; return; }
    if (!r.ok) { setHint('Erreur ' + r.status, 'err'); $('saveBtn').disabled = false; return; }
    cfg = { ...cfg, ...(await r.json()) };
    setHint('✓ Enregistré', 'ok');
  } catch (e) { setHint('Erreur : ' + e.message, 'err'); }
  $('saveBtn').disabled = false;
});

load();
</script>
</body>
</html>
